# Model settings
diffusion_steps: 500
diffusion_noise_schedule: 'cosine'              # 'cosine', 'polynomial_2'
n_layers: 5
dropout: 0.1

output_y: False                              # if the model contain last layer to output y
scaling_layer: False

extra_features: 'all'        # 'all', 'cycles', or null
eigenfeatures: True
edge_features: 'all'          # 两者都有或者路径特征（path / 距离）和局部邻居特征（local neighbors）二选一。'all', 'dist', 'localngbs' or null
num_eigenvectors: 8       # eigenvectors
num_eigenvalues: 5      # eigenvalues
use_charge: False
num_degree: 10
dist_feat: True
positional_encoding: False  # True for ablations, to keep the equivariance, it should be False!

# sign net
sign_net: False
sn_hidden_dim: 32

# sparse generation settings
edge_fraction: 0.5
# 采样时内层循环是否每轮用上一轮采样结果更新当前图（true=每轮基于上一轮结果，false=多轮共用同一 t 时刻图）
autoregressive: false

# DiHuG denoiser / query settings
# denoiser: graph_transformer keeps the inherited SparseDiff layer; hgt uses pyHGT-style HGTConv.
denoiser: hgt
# HGT time conditioning: SparseDiff-style y/t FiLM on node/edge hidden states.
use_time_film: false
# Per-layer edge-state update for HGT, closer to SparseDiff's joint X/E/y updates.
use_edge_state_update: false
# Edge state update mode: "all" = update at every layer; "last" = only update at the last layer (saves VRAM).
edge_state_update_mode: "all"
# Scale of the raw input edge-state residual added to edge logits during
# training/forward. SparseDiff-style residual denoising uses 1.0.
edge_input_residual_scale: 1.0
block_query: false
block_partition_mode: connected_bfs
block_partition_rho: null
# hetero_metis: relation family frequency normalization power. 0=no balance, 0.5=1/sqrt(freq), 1=1/freq.
hetero_metis_relation_balance_power: 0.5
# After hetero_metis, swap same-type nodes between blocks to balance degree load/hub mass.
hetero_metis_refine_degree_balance: false
hetero_metis_refine_max_iter: 200
# Optional structure-preserving refinement: when balancing degree load, penalize
# swaps that cut same-type high-degree/high-degree edges from intra-block to
# cross-block. This keeps hub-core relation patterns visible during training
# without hard-coding a PubMed-specific node or relation name.
hetero_metis_refine_preserve_high_high: false
hetero_metis_refine_preserve_high_quantile: 0.8
hetero_metis_refine_preserve_penalty_weight: 0.0
# hetero_metis 首次划分时打印前几个块的类型/关系摘要；0 表示只打印总体块大小。
hetero_metis_log_top_blocks: 5
# true=选中真实图局部块后，query 块内所有合法边；false=仍按 edge_fraction 抽块内一部分边。
block_query_full_block: false
# true=block full query 后，如果块内边少于 edge_fraction 原预算，从该块到其它块的块间候选边中随机补足。
block_query_inter_fill: false
# block_query_full_block 可能使某些关系族块内合法边过多；>0 时对每个关系族的 selected query 做上限截断。
block_query_max_edges_per_family: 0
# true=block query 之外继续拼接原来的全局 uniform query；false=训练只用 block query。
block_query_include_uniform: true
train_partition_source: noisy
sampling_partition: auto
# Query-free staged family training: encode full visible G_t once, then decode
# same-type families first and cross-type families second. Query candidates do
# not participate in message passing.
train_family_staged_queryfree: false
train_family_staged_query_chunk_size: 65536
train_family_staged_max_chunks: 0
# current | no_edge. Applies to query-free training losses: no_edge asks the
# decoder to rank candidates from context/node embeddings rather than the
# candidate's current noisy E_t state.
train_queryfree_query_state: current
# Family-specific residual adapters on top of the shared edge head.
# The final adapter layer is zero-initialized, so enabling this starts from the
# base head behavior and learns per-family corrections.
use_family_edge_adapters: false
family_edge_adapter_hidden_dim: 64
train_family_staged_balance_by_family: true
# sampling block query mode: uniform | type_template. type_template uses train-time block type-count templates, not true block members.
sampling_block_mode: uniform
# true=采样初始化时按训练 block/family 边数模板随机生成初始边，而不是只用全局 family 平均边数。
sampling_block_template_init: false
# true=采样初始化时用全局 family marginal 密度作用到 block/block-pair 候选池，不使用真实 block 边数模板。
sampling_block_marginal_init: false
sampling_block_family_budget_projection: false
sampling_block_family_budget_source: marginal
sampling_block_family_budget_multiplier: 1.0
sampling_block_family_budget_intra_multiplier: 1.0
sampling_block_family_budget_inter_multiplier: 1.0
sampling_block_family_budget_keep_policy: random
block_partition_workers: 0
use_edge_phi_fusion: true
use_dual_softmax: true
# Sparse GraphTransformerConv hetero X/E/y layer options. These are used when
# model.denoiser=graph_transformer. They keep the DiGress/SparseDiff X-E-y
# update path while adding HGT-style family/type specialization.
use_family_film: false
use_family_edge_update: false
family_edge_update_hidden_dim: 128
# HGT-style relation matrices in the node message channel. These are distinct
# from E->attention FiLM: relation matrices transform K/V for each edge family,
# while edge FiLM still modulates attention with the current noisy edge state.
use_relation_attention_matrix: false
use_relation_message_matrix: false
# Sparse hetero graph-level y features computed from the current sparse noisy
# graph: family counts/densities, same-vs-cross edge ratio, and type degree
# statistics. This avoids dense spectral/cycle features for large hetero graphs.
use_sparse_hetero_y: false
# Add a per-graph, per-relation-family conditioning table computed once from
# the current noisy graph. The model projects this raw table into dy; the two
# switches below decide whether it conditions node message attention, E update,
# or both.
use_sparse_family_y: false
sparse_family_y_degree_bins: 5
# Add family_y[edge_family] to edge_attr before the E->attention FiLM.
use_family_y_in_attention: false
# Add family_y[edge_family] to global y before the y->E FiLM.
use_family_y_in_edge_film: false
# Apply y->E FiLM with per-family linear maps. This lets the same global y
# vector guide each relation family differently.
use_family_y_film: false
# Candidate-edge structural residual for model.denoiser=graph_transformer.
# These query-level features are computed from the current noisy visible graph
# and added as a zero-initialized residual on edge logits, so enabling the
# module starts from the base denoiser behavior.
use_edge_struct_features: false
edge_struct_feature_dim: 8
edge_struct_hidden_dim: 64
edge_struct_residual_scale: 1.0
# If true, concatenate projected family_y[f] to the candidate-edge structural
# features before predicting the residual.
edge_struct_use_family_y: false
# Split visible G_t edges and temporary no-edge query links into separately
# normalized attention channels, then learn their mixture per HGT layer/head.
use_query_context_gate: false
query_context_gate_init: 0.2
# Add a learned residual to query logits from current-G_t common-neighbor
# closure, endpoint degree scale, and endpoint degree imbalance.
use_two_hop_structure: false
two_hop_structure_hidden_dim: 64
# Add typed two-hop path counts to the two-hop residual: common-neighbor
# counts by middle node type, plus first-leg and second-leg family counts.
use_typed_two_hop_structure: false
# Scale the learned structural residual before adding it to edge logits.
two_hop_structure_scale: 1.0
# fixed | linear_t | quadratic_t | alpha_bar_squared
# The effective residual scale is two_hop_structure_scale times this
# time-dependent reliability factor.
two_hop_structure_schedule: fixed
# A-stage experiment: expose current-G_t endpoint roles to the edge decoder
# without adding any role-distribution supervision.
use_endpoint_role_residual: false
endpoint_role_hidden_dim: 64
endpoint_role_family_dim: 16
endpoint_role_scale: 1.0
# B-stage experiment: teach the endpoint-role residual how to use degree roles
# through a soft family-role ranking/distribution objective on current query
# edges. Disabled by default.
family_role_loss_weight: 0.0
family_role_loss_warmup_epochs: 0
family_role_loss_min_reliability: 0.0
family_role_loss_temperature: 1.0
subtype_dim: 32

# The dimensions should satisfy dx % n_head == 0
hidden_dims : {'dx': 128, 'de': 64, 'dy': 64, 'n_head': 8, 'dim_ffX': 256, 'dim_ffE': 128, 'dim_ffy': 128}
# dim_ffX	节点分支里 FFN 的中间维。
# loss = loss_X + lambda_train[0]*loss_E + lambda_train[1]*loss_y + lambda_train[2]*loss_charge
lambda_train: [5, 0, 2] # 这是训练总损失里各项的权重（节点损失固定为 1，不写进列表）, E = lambda[0], y = lambda[1]

# existence BCE 正类权重（存在性损失里正负边权重调节，当前唯一生效的项）
# - null: 不加权（默认）
# - 'auto': 每个 step 在当前 query 上用 neg/pos 动态计算 pos_weight
# - 数值: 固定 pos_weight（例如 5.0, 10.0, 20.0）
exist_pos_weight: 1
# Edge-level supervised loss weights. Lower edge_exist_weight tests whether
# exact edge recovery can be softened while structural objectives carry more of
# the denoising signal.
edge_exist_weight: 1.0
edge_subtype_weight: 1.2
# Sampling-only correction for a model trained with fixed positive-class BCE
# weight w. Before reverse-posterior computation, subtract log(w) from every
# positive edge-class logit so the existence score recovers an unweighted
# probability interpretation. Unsupported for exist_pos_weight='auto'.
sampling_calibrate_exist_pos_weight: false
# existence loss: bce | focal. focal 用于 query 正负极度不平衡时抑制 easy negatives。
exist_loss_type: bce
exist_focal_gamma: 2.0
exist_focal_alpha: 0.75
# Sampling-only existence calibration. Positive bias reduces sampled edge count:
# p_exist = sigmoid((logsumexp(pos)-noedge) / temperature - bias).
sampling_exist_logit_bias: 0.0
sampling_exist_temperature: 1.0
# Convert model p(E_0|E_t) predictions to the diffusion-consistent reverse
# posterior p(E_s|E_t) before applying the configured edge selection policy.
sampling_use_reverse_posterior: false
# Optional probability-space posterior weights aligned with the reverse
# transitions returned by the sampling schedule. For a 4-step path
# 100->75->50->25->0, [0,0,0.25,0.75] trusts the clean model prediction early
# and gradually restores posterior stabilization late. null means full
# posterior weight 1.0 at every transition.
sampling_reverse_posterior_mix_weights: null
# Continuous alternative to explicit weights:
# full | alpha_bar_s | alpha_bar_s_squared.
sampling_reverse_posterior_mix_mode: full
sampling_reverse_posterior_mix_scale: 1.0
# Compute clean-vs-mixed exact-K intervention diagnostics without another
# model forward. Intended for sampling mechanism experiments.
sampling_ranking_intervention_diag: false
# Sampling-only override for the raw input edge-state residual added to edge
# logits. null keeps model.edge_input_residual_scale. Use 0.0 for exact-K/top-K
# ablations where the residual can lock the selected edge set across steps.
sampling_edge_input_residual_scale: null
# Sampling-only global exact-K path: encode the current visible G_t once, then
# decode candidate edges without inserting query candidates into message passing.
# This matches query-free training and avoids current-query-state lock-in.
sampling_queryfree_decode: false
# current | no_edge. For exact-K clean re-ranking, no_edge prevents the decoder
# from using the candidate's current E_t state as a shortcut. Posterior logic
# still receives the true current label separately.
sampling_queryfree_query_state: current
# When reverse posterior sampling is enabled, use stochastic Bernoulli decisions
# on intermediate steps as in SparseDiff for legacy local selection policies.
# Global gumbel_exact_k/deterministic_exact_k remain global exact-K at every step.
sampling_reverse_posterior_stochastic_steps: true
# Sampling edge decision:
# - bernoulli: sample each query edge independently from p_exist.
# - bernoulli_expected_density: before Bernoulli sampling, solve one additive
#   intercept per relation family so the sum of probabilities matches that
#   family's canonical marginal expected edge count in the current query pool.
# - gumbel_exact_k: collect all block-query candidates, deduplicate canonical
#   edges, then select exactly K_f per family by posterior_logit / temperature
#   plus one Gumbel draw per unique edge.
# - deterministic_exact_k: the same global candidate path without Gumbel noise.
# - gumbel_exact_k_degree_pair / deterministic_exact_k_degree_pair: same exact-K
#   quotas, but add a family degree-bin-pair prior to the global ranking score.
# - gumbel_exact_k_degree_pair_quota / deterministic_exact_k_degree_pair_quota:
#   same exact-K family quotas, but allocate a configurable fraction of each
#   family K by the training graph degree-bin-pair distribution before filling
#   the rest by ordinary score ranking.
# - topk_density: within each query relation family, keep the top-k p_exist edges where
#   k follows the training graph family density. This prevents high-noise Bernoulli
#   probabilities from exploding sparse graph edge counts.
# - topk_degree_pair: like topk_density, but split each relation-family quota by the
#   training graph's endpoint degree-bin pair distribution to preserve disassortative
#   hub-to-low-degree mixing.
# - topk_structure: self-adjusting per-family top-K where K follows the current
#   posterior mean p_exist in that family. Set
#   sampling_topk_structure_family_balance=equal_quota for a multi-category
#   comparison that gives same-type families equal selected-edge budgets, or
#   target_count to use the training graph family edge counts as per-family K.
# - connectivity_topk: cache family Top-K plus block-pair bridge candidates,
#   build a family-constrained maximum-spanning forest, then fill exact family quotas.
# - topk_density_repair: use ordinary topk_density on preceding steps; on the explicit
#   final sampling step, run global family Top-K and minimally exchange same-family
#   non-forest edges for high-score component-bridging candidates.
sampling_edge_selection: bernoulli
sampling_topk_structure_family_balance: none
# Gumbel exact-K only. Lower values approach deterministic family Top-K.
sampling_gumbel_temperature: 1.0
# Optional sampling-only partition-view experiment. Both views receive exactly
# the same canonical query pool and frozen G_t; only the grouping of queries
# inside the HGT computation graph differs.
# off | metis_only | random_only | mean
sampling_partition_ensemble: off
# Weight of the current-G_t hetero-METIS clean logits in mean mode.
sampling_partition_ensemble_metis_weight: 0.5
# Spearman diagnostics use at most this many evenly sampled candidates per step.
sampling_partition_ensemble_diag_max_candidates: 100000
# Training counterpart of the partition-view experiment. A single noisy G_t
# and one shared canonical query pool are split by both views. Gradients are
# accumulated across small rounds and one optimizer step is taken per G_t.
train_partition_ensemble: false
train_partition_ensemble_metis_weight: 0.5
train_partition_ensemble_num_blocks: 0
# Context visible to each partition view: all within-block G_t edges plus this
# fraction of cross-block G_t edges. The two views use one shared total budget.
partition_context_cross_edge_ratio: 0.1
# Optional fixed context budget. 0 derives one shared budget from both views:
# max(intra_metis, intra_random) + ratio * remaining G_t edges.
partition_context_edge_budget: 0
# gumbel_exact_k / deterministic_exact_k only. On the final denoising step,
# minimally connect components by exchanging a high-posterior bridge candidate
# for the lowest-posterior selected non-forest edge in the same family. Exact
# family quotas and the total edge count remain unchanged.
sampling_exact_k_connectivity_repair: false
# Maximum number of same-family exchanges during final exact-K repair.
# 0 means no explicit limit (at most components_before - 1 exchanges).
sampling_exact_k_repair_max_swaps: 0
# topk_density_repair only: repair connectivity only after the explicitly marked
# final denoising step. Set false only for an every-step ablation.
sampling_connectivity_repair_final_only: true
# connectivity_topk only: high-logit candidates retained per
# (graph, family, pseudo-block pair), in addition to the global family pool.
sampling_connectivity_pair_topm: 32
sampling_degree_pair_bins: 5
# Fraction of each family quota allocated by degree-pair bins; the rest falls back
# to ordinary family top-k. Lower this if connectivity/LCC drops too much.
sampling_degree_pair_strength: 1.0
sampling_degree_pair_min_bin_edges: 1
# Clamp for the global exact-K degree-pair log-prior before multiplying by
# sampling_degree_pair_strength.
sampling_degree_pair_bias_clip: 4.0
# Sampling-time structural ranking prior for global exact-K. These terms do
# not use true edge membership: closure/connect are computed from the current
# sampled graph, while degree-pair/assortativity use training-graph distribution
# statistics. Effective weight = base * (remaining_step / T) ** power.
sampling_structure_guidance_closure_weight: 0.0
sampling_structure_guidance_connect_weight: 0.0
sampling_structure_guidance_degree_pair_weight: 0.0
sampling_structure_guidance_assort_weight: 0.0
sampling_structure_guidance_power: 1.0
sampling_structure_guidance_min_step_frac: 0.0
sampling_structure_guidance_max_step_frac: 1.0
# null means infer sign from the reference graph when available; negative target
# favors dissimilar endpoint degree bins, positive target favors similar bins.
sampling_structure_guidance_assort_target: null
# Query-level calibration loss: |mean(P(edge)) - mean(true_edge)|.
# This keeps Bernoulli sampling probabilities aligned with sparse graph density.
edge_count_loss_weight: 0.0
# 辅助边数校准 warmup；>0 时从 0 线性升到 edge_count_loss_weight，避免前期正边排序被稀疏校准压垮
edge_count_loss_warmup_epochs: 0
# Training-only soft endpoint degree-pair supervision. For each relation family,
# aggregate predicted p(edge) over endpoint clean-degree-bin pairs and align the
# resulting distribution with the clean graph reference, restricted to bins
# represented in the current query set. This teaches the model the role-mixing
# signal exposed by oracle degree-pair quota sampling without using quotas at
# sampling time.
degree_pair_dist_loss_weight: 0.0
degree_pair_dist_loss_warmup_epochs: 0
degree_pair_dist_loss_type: js  # js | kl | l1 | mse
# block: match the clean degree-pair distribution restricted to the current
# query block. reference: match the full training-graph degree-pair prior,
# restricted to bins present in the current query block.
degree_pair_dist_target: block  # block | reference
degree_pair_dist_min_query_edges: 32
degree_pair_dist_target_smoothing: 0.0
# Optional high-noise emphasis for soft structural objectives. 0 keeps the
# weight constant; 1 multiplies by t/T; 2 by (t/T)^2.
degree_pair_dist_loss_t_power: 0.0
# Family-wise expected edge-count supervision. This is a low-order structural
# moment: for each relation family, align sum P(edge) on the query candidates
# with the clean family density represented in the same query set.
family_count_loss_weight: 0.0
family_count_loss_warmup_epochs: 0
family_count_loss_type: l1  # l1 | mse
family_count_loss_min_query_edges: 32
family_count_loss_t_power: 0.0
# Closure-aware positive auxiliary loss: 对真实图中共同邻居多的正边额外加权，强化局部闭包/三角形关键边。
closure_pos_loss_weight: 0.0
closure_pos_loss_warmup_epochs: 0
closure_pos_score_log1p: true
closure_pos_score_normalize: true
# 只保留 closure score 位于该分位数以上的正边；0 表示不筛选，0.8 表示 top 20%。
closure_pos_top_quantile: 0.0
# closure score 封顶；<=0 表示不封顶。
closure_pos_score_cap: 0.0
# Closure ranking does not require recovering a specific clean edge. Within
# each relation family it only asks high-clean-common-neighbor candidates to
# outrank low-clean-common-neighbor candidates, using a pairwise logistic loss.
closure_rank_loss_weight: 0.0
closure_rank_loss_warmup_epochs: 0
closure_rank_loss_t_power: 1.0
closure_rank_min_query_edges: 64
closure_rank_pairs_per_family: 2048
closure_rank_top_quantile: 0.8
closure_rank_bottom_quantile: 0.5
closure_rank_min_common_neighbors: 1.0
closure_rank_score_log1p: true
closure_rank_margin: 0.0
# Common-neighbor counts for closure_rank are computed in chunks to avoid
# materializing query_edges x num_nodes at once.
closure_rank_common_neighbor_chunk_size: 65536
# Training-time hard top-K structure probe. This does not affect gradients.
# Every N epochs, select K query edges by model existence score where K equals
# the number of clean positives in the query block, then log structural proxies
# of the selected set.
train_structure_probe_every_epochs: 0
train_structure_probe_min_query_edges: 256

# true=进入全图 ideal 分支；false=SparseDiff 原版目标，直接 CE(pred, real)。
structure_only_global: false
# ideal 优化时 query soft 的梯度步长（仅 structure_only_global 时有效）；三角形不足时可略提高到 0.15
structure_ideal_lr: 0.15
# ideal 优化梯度下降迭代步数；原图三角形多、生成少时可提高到 10~12
structure_ideal_steps: 10
# true=ideal 固定 query 显式边数 k=k_noisy（仅优化「哪 k 条为 1」），边数中性，多轮采样时场景边数一致；false=sigmoid 独立概率
# 异质图下 fix_k 时默认在关系族内限制边数（每族 k_fam 不变）
structure_ideal_fix_k: true
# fix_k=false 时生效：ideal 边数偏置。null/1.0=不偏置；>1 促使 ideal 有更多边（如 1.2=偏多 20%）；<1 促使更少边。配合 exist_pos_weight 可调节预测边数。
structure_ideal_edge_count_ratio: null
structure_ideal_edge_count_loss_weight: 0.0
# 结构指标类型：legacy=relation_matrix/metapath2/3/subtype_degree；graph_metrics=DegreeMMD/Clustering/Triangles/EdgeTypesTV
structure_loss_type: 'graph_metrics'
degree_mmd_loss_weight: 0.0
clustering_loss_weight: 0.0
# ideal 优化时三角形项权重；原图 300+ 三角形、生成仅几十时可提高到 5~8
triangles_loss_weight: 0.0
# 楔形闭包损失权重：在真实图存在 2-hop 路径的位置，约束预测边是否闭合；用于补足“只看三角形总量”的不足
wedge_closure_loss_weight: 0.0
# true=三角形数用相对误差归一化，避免原始计数（10^4~10^6）主导 ideal 梯度；false=原始 L1
structure_triangles_normalize: true
edge_types_tv_loss_weight: 0.0
structure_loss_max_nodes: 3000
# 三角形辅助损失权重：0=关闭；>0 时在 ideal 模式下对「预测全图 vs 真实图」再加一项三角形+聚类损失，直接推高生成三角形数（ACM 等可设 0.5~1.0）
triangle_aux_loss_weight: 0.0
# 三角形辅助损失在训练进度 [start, end] 内线性 ramp（0~1）；用于前期稳住全局结构、后期再拉三角形
triangle_aux_ramp_start: 0.0
triangle_aux_ramp_end: 1.0
# ideal 内循环的“离散一致性校验”：
# true 时每次梯度步后把候选 ideal 投影到硬图并复算结构损失，仅接受硬图损失不变差的更新（否则回退）。
ideal_hard_consistency_check: false
# 硬图一致性接受阈值：candidate_hard_loss <= best_hard_loss + tol 即接受
ideal_hard_accept_tolerance: 1.0e-8
# 记录 ideal 行为日志（accept/reject 次数、hard loss 改善）
ideal_log_actions: false
# ideal 更新策略：
# - soft: 现有连续 logits 梯度更新
# - greedy_swap: fix_k=true 下，按梯度贪心选 m 对删加边（swap）
# - greedy_add_del: fix_k=true 下，先加后删（数量对称）
# - greedy_del_add: fix_k=true 下，先删后加（数量对称）
ideal_update_strategy: soft
# greedy 策略每步执行的动作对数 m（删m加m）
ideal_greedy_m: 1
# greedy 策略候选池大小（add/del 各取 top-k）
ideal_greedy_candidate_k: 8
# greedy 策略对 logits 的硬更新步长
ideal_hard_step_size: 0.15
# greedy 策略的 motif 闭包增益权重（0=关闭；建议 0.1~1.0 做对照）
ideal_motif_gain_weight: 0.0
# motif 三角形门控容忍区间（|tri_target-tri_current|<=tol 时不施加 motif 偏置，避免在目标附近过冲）
ideal_motif_tri_tolerance: 0
# 异质图 query 边按关系族均衡分配预算，避免大类别组合挤掉小类别组合。
query_family_balanced_sampling: true
# query 边采样是否启用“子类别分块优先”（同类型关系族内优先同子类别节点对）
query_subtype_block_sampling: false
# 子类别分块采样中块内（同子类别）边的目标比例，剩余预算给跨子类别
query_subtype_intra_ratio: 0.8
# 训练阶段 query 分块模式：
# - none: 不分块
# - random_ab: 每步随机训练 A 或 B
# - sequential_ab: 按 step 奇偶交替训练 A/B（单步单前向的稳定近似）
query_block_train_mode: none
# A/B 分块时保留在两块中的共享边比例（用于跨块桥接，建议 0.1~0.2）
query_block_overlap_ratio: 0.0
# true=记录训练/采样时每次预测行为（n_query,n_pred_exist,n_ideal_exist 等），便于比较 loop0/loop1 与训练是否一致
log_predict_behavior: false

# 单图/极稀疏图训练增强：将所有真实正边追加到每步 query 中作为监督目标。
# 注意：正边只作为 query target，输入计算图中仍是 no-edge query 占位，不直接泄漏标签。
query_include_all_positive_edges: false
# 单图训练增强：每个 Lightning step 内重复采样 query K 次，平均 loss 后反传。
train_query_repeats: 1
# 训练噪声时间步调度：random=原始随机采样；cycle=按训练步循环覆盖 1..diffusion_steps。
train_t_schedule: random
# cycle 调度下每个 t 连续重复多少个训练 step/epoch；单图时 repeats=5 表示 t=1 连续 5 个 epoch，再到 t=2。
train_t_cycle_repeats: 1
# 单图块训练增强：一次加噪后顺序训练多个 true blocks，使每个 noisy graph 覆盖完整块集合。
train_all_blocks_per_noise: false
# sequential: 每个 block 单独 backward+optimizer.step。
# accumulate: 同一 noisy graph 覆盖所有 blocks，逐块 backward 累梯度，最后 optimizer.step。
# accumulate_global: 所有 blocks 的计算图保留到最后，拼接 query logits 后算严格全覆盖结构 loss；最贴近全图目标但最容易 OOM。
# accumulate_streaming_global: 先无梯度扫全块估计全局结构统计，再逐块反传并释放计算图；近似 global，适合正式跑。
train_all_blocks_step_mode: sequential
# true=每次加噪后随机打乱 block 顺序。
train_all_blocks_shuffle: true
# <=0 时使用 ceil(1 / edge_fraction) 作为 block 数。
train_all_blocks_count: 0
# 轻量 degree-aware loss：约束 query 上预测存在概率形成的节点度分布。
degree_loss_weight: 0.0
# degree 辅助项 warmup；建议和 edge_count_loss_warmup_epochs 一起使用
degree_loss_warmup_epochs: 0
degree_loss_type: l1
degree_loss_normalize: true
# degree_loss_mode:
# - distribution: 原行为，只对齐 query 内归一化节点度分布
# - raw: 对齐 query 内每个节点的原始期望度/真实度
# - mixed: distribution + raw，适合单图稀疏异质图，避免边均匀撒开
degree_loss_mode: distribution
# mixed/raw 模式下 raw 项权重；建议 0.5~1.0 起步
degree_loss_raw_weight: 1.0
# raw 项 hub 加权强度；0 表示不加权，0.5 会更重视高真实度节点
degree_loss_hub_power: 0.5
# raw 项按节点类型分别归一，避免大节点类型支配 degree loss
degree_loss_type_balanced: true

# 异质图节点嵌入调制方式（边关系预测以子类别为基底）
# use_type_modulation: True  -> Q = (1 + γ_Q(T)) ⊙ W^Q_t X + β_Q(T)，类别调制子类别
# use_type_modulation: False -> Q = W^Q_t X，纯子类别基底，无类别调制
# 两种方案可对比实验以提升边关系准确率
use_type_modulation: True

# 边预测在语义上始终是「双层」：先存在性再子类型（existence + subtype）。
# edge_only_model: true = 全部层只更新边 E，节点 X 仅作条件输入（固定节点、只生成边）；false = 正常 XEy，每层同时更新 X 和 E。
edge_only_model: true

# 训练范式开关（隔离两种方式，避免相互干扰）：
# - edge_prediction: 精简主线，仅直接预测 query 边真实标签
# - edge_only_ideal: ideal 结构目标实验
# - joint_structure: 在上述基础上额外加入「节点子类别分布损失」（不做节点CE逐点对齐）
training_mode: edge_prediction
# joint_structure 下节点分布损失权重（0=关闭，不影响 edge_only_ideal）
node_dist_loss_weight: 0.0
# joint_structure 下条件分布项权重：L_node = TV(global_subtype) + w * TV(subtype|type)
node_dist_conditional_weight: 0.5
# 是否启用 subtype|type 条件分布项
node_dist_include_conditional: true
# 节点分布损失 warmup epoch 数（0=不warmup）
node_dist_warmup_epochs: 0
