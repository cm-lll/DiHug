# @package _global_
# HGHG 多图分布生成训练（图级划分）
# 注意：dataset.datadir 需指向一个包含多个 subgraph_* 的目录
defaults:
  - override /dataset: hghg_subgraphs

dataset:
  single_graph: false

general:
  name: 'hghg_multi_train'
  sparse: true
  log_every_n_steps: 20
  checkpoint_monitor: 'val/epoch_NLL'
  val_sampling_style: true
  enable_val_sampling: true
  enable_val_pred_metrics: false
  check_val_every_n_epochs: 20
  sample_every_val: 20
  enable_test_sampling: true
  run_test_after_train: true
  test_variance: 3
  sampling_skip: 5
  skip_first_validation: true
  cond_edge_gen_fixed_nodes: false
  enable_visualization: false

train:
  n_epochs: 220
  batch_size: 1
  save_model: true

model:
  structure_only_global: true
  n_layers: 4
  # Multi-graph OOM guard: reduce per-edge/per-node hidden width.
  hidden_dims: {'dx': 96, 'de': 32, 'dy': 48, 'n_head': 4, 'dim_ffX': 192, 'dim_ffE': 96, 'dim_ffy': 96}
  diffusion_steps: 100
  exist_pos_weight: 3
  extra_features: null
  autoregressive: true
