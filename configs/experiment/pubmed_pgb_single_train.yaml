# @package _global_
# PubMed PGB 异质图单图训练（Paper+Author）
defaults:
  - override /dataset: pubmed_pgb_subgraphs
dataset:
  single_graph: true
  single_graph_split: 'train'
  single_graph_index: 0
general:
  name: 'pubmed_pgb_single_train'
  sparse: true
  log_every_n_steps: 1
  checkpoint_monitor: 'train_epoch/NLL'
  val_sampling_style: true
  enable_val_pred_metrics: false
  remove_h: true
  sampling_skip: 5
  skip_first_validation: true
  cond_edge_gen_fixed_nodes: true
train:
  n_epochs: 200
  batch_size: 1
  save_model: True
model:
  structure_only_global: false
  n_layers: 4
  diffusion_steps: 100
  exist_pos_weight: 3
  extra_features: null
  autoregressive: true
