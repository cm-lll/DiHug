# @package _global_
# ACM 单图：一张子图 train/val/test，与 general_default 相同项已删
defaults:
  - override /dataset: acm_subgraphs
dataset:
  single_graph: true
  single_graph_split: 'train'
  single_graph_index: 0
general:
  name: 'acm_single_train'
  sparse: true
  log_every_n_steps: 1          # 单图每 epoch 仅 1 batch，需 1 才看得到 step 日志
  checkpoint_monitor: 'train_epoch/NLL'
  val_sampling_style: true     # 验证与测试一致：多步去噪采样
  enable_val_pred_metrics: false
  remove_h: true
  sampling_skip: 5
  skip_first_validation: true
  cond_edge_gen_fixed_nodes: true
train:
  n_epochs: 200
  batch_size: 1
  save_model: True
model:
  # 启用 ideal 以改善三角形/聚类等局部结构（原图 300+ 三角形、生成仅几十时务必 true）
  structure_only_global: true
  n_layers: 4
  diffusion_steps: 100
  exist_pos_weight: 3
  extra_features: null
  autoregressive: true
  # 加强三角形：ideal 中三角形权重大、步数多；并加三角形辅助损失直接推高生成三角形数
  triangles_loss_weight: 6
  structure_ideal_steps: 10
  structure_ideal_lr: 0.15
  triangle_aux_loss_weight: 0.5
