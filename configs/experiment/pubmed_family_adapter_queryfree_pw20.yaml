# @package _global_
defaults:
  - pubmed_baseline_single_train

general:
  name: dihug_pubmed1565_family_adapter_queryfree_pw20_ep100

train:
  n_epochs: 100

model:
  edge_fraction: 0.5
  use_edge_state_update: false
  use_edge_phi_fusion: false

  # Simultaneous all-family training: one noisy full-graph encoder context,
  # decoder-only full candidate chunks for every active relation family.
  train_family_staged_queryfree: true
  train_family_staged_query_chunk_size: 32768
  train_family_staged_max_chunks: 0
  train_family_staged_balance_by_family: true
  train_partition_ensemble: false
  train_all_blocks_per_noise: false

  # Shared base edge head plus per-family zero-initialized residual adapters.
  use_family_edge_adapters: true
  family_edge_adapter_hidden_dim: 64

  exist_loss_type: bce
  exist_pos_weight: 20
  edge_count_loss_weight: 0.0
  edge_count_loss_warmup_epochs: 0
  degree_loss_weight: 0.0
  closure_pos_loss_weight: 0.0
  triangle_aux_loss_weight: 0.0
  degree_mmd_loss_weight: 0.0
  clustering_loss_weight: 0.0
  triangles_loss_weight: 0.0
  wedge_closure_loss_weight: 0.0
  edge_types_tv_loss_weight: 0.0

  sampling_edge_selection: gumbel_exact_k
  sampling_calibrate_exist_pos_weight: true
  sampling_use_reverse_posterior: true
  sampling_reverse_posterior_mix_mode: alpha_bar_s
  sampling_reverse_posterior_mix_scale: 0.2
  sampling_gumbel_temperature: 0.01
