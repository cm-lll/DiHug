# @package _global_
# HGHG 单图训练基础配置（可复现基线）
# 对照实验时建议仅在命令行覆盖单个变量（如 model.autoregressive=false）
defaults:
  - override /dataset: hghg_subgraphs

dataset:
  single_graph: true
  single_graph_split: 'train'
  single_graph_index: 0

general:
  name: 'hghg_single_train'
  sparse: true
  log_every_n_steps: 1
  checkpoint_monitor: 'train_epoch/NLL'
  val_sampling_style: true
  enable_val_pred_metrics: false
  remove_h: true
  sampling_skip: 5
  skip_first_validation: true
  cond_edge_gen_fixed_nodes: true
  enable_visualization: false

train:
  n_epochs: 220
  batch_size: 1
  save_model: true

model:
  structure_only_global: true
  n_layers: 4
  diffusion_steps: 100
  exist_pos_weight: 3
  extra_features: null
  autoregressive: true
